<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安理工学生工具门户</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 星空背景画布 -->
    <canvas id="starfield"></canvas>

    <!-- 顶部区域 -->
    <header class="header">
        <div class="header-content">
            <!-- 网站名称 -->
            <div class="site-title">
                <h1>安理工学生工具门户</h1>
                <p class="disclaimer" id="disclaimer">非官方·学生自制公益工具站</p>
            </div>

            <!-- 搜索框和深色模式切换 -->
            <div class="header-controls">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索工具..." autocomplete="off">
                    <span class="search-icon">🔍</span>
                </div>
                <button class="theme-toggle" id="themeToggle" aria-label="切换深色模式">
                    <span class="theme-icon">🌙</span>
                </button>
            </div>
        </div>
    </header>

    <!-- 跳转提示 -->
    <p class="nav-hint">点击工具链接将跳转到外部网站，返回请使用浏览器后退按钮</p>

    <!-- 主内容区域 -->
    <main class="main-content" id="mainContent">
        <!-- 工具链接区块将通过JS动态生成 -->
        <div id="toolsContainer"></div>

        <!-- 通知公告区块 -->
        <section class="section notices-section" id="noticesSection">
            <h2 class="section-title">通知公告</h2>

            <!-- 标签筛选 -->
            <div class="filter-tags" id="filterTags">
                <!-- 标签将通过JS动态生成 -->
            </div>

            <!-- 通知列表 -->
            <div class="notices-list" id="noticesList">
                <!-- 通知将通过JS动态生成 -->
            </div>
        </section>

        <!-- 关于本站 -->
        <section class="section about-section" id="aboutSection">
            <h2 class="section-title">关于本站</h2>
            <div class="about-content">
                <div class="about-item">
                    <h3>项目介绍</h3>
                    <p>安理工学生工具门户是一个整合校园常用链接的导航站点，旨在为同学们提供便捷的一站式入口。</p>
                </div>
                <div class="about-item">
                    <h3>免责声明</h3>
                    <p>本站为学生自发维护的非官方项目，所有链接均跳转至学校官方或第三方平台。使用第三方服务时请遵守其服务条款，注意保护个人信息安全。</p>
                </div>
                <div class="about-item">
                    <h3>联系我们</h3>
                    <p>如有问题或建议，欢迎通过以下方式反馈：</p>
                    <ul class="contact-list">
                        <li>邮箱：3524045145@qq.com</li>
                        <li>反馈表单：<a href="#" target="_blank">点击反馈</a></li>
                    </ul>
                </div>
            </div>
        </section>
    </main>

    <!-- 底部 -->
    <footer class="footer">
        <p class="footer-disclaimer">非官方·学生自制公益工具站</p>
        <p class="footer-info">
            <span id="versionText"></span>
            · <a href="#" target="_blank">意见反馈</a>
            · <a href="#" target="_blank">Github</a>
        </p>
    </footer>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
